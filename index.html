    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/apple-splash-portrait-light-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="screen and (prefers-color-scheme: dark) and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/apple-splash-portrait-dark-1125x2436.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/apple-splash-portrait-light-1125x2436.png" />

    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="./splash/apple-splash-portrait-light-828x1792.png" />

    <link rel="apple-touch-startup-image" media="screen and (prefers-color-scheme: dark) and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="./splash/apple-splash-portrait-dark-2048x2732.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="./splash/apple-splash-portrait-light-2048x2732.png" />
    <link rel="apple-touch-startup-image" media="screen and (prefers-color-scheme: dark) and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="./splash/apple-splash-portrait-dark-1668x2388.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="./splash/apple-splash-portrait-light-1668x2388.png" />
    <meta name="theme-color" content="%VITE_THEME_COLOR_DARK%" />
    <title>%VITE_APP_TITLE%</title>
    <script>
      (() => {
        const themeStorageKey = 'ui-theme';
        const root = document.documentElement;
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');

        const getThemeColor = (theme) => window
          .getComputedStyle(root)
          .getPropertyValue(theme === 'dark' ? '--theme-color-dark' : '--theme-color-light')
          .trim();

        const resolveTheme = () => {
          try {
            const storedTheme = JSON.parse(window.localStorage.getItem(themeStorageKey) ?? 'null');
            if (storedTheme === 'dark' || storedTheme === 'light') return storedTheme;
          } catch {
            // Ignore invalid storage and fall back to device preferences.
          }

          try {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch {
            return 'dark';
          }
        };

        const theme = resolveTheme();

        root.classList.add(theme);
        root.dataset.theme = theme;
        themeColorMeta?.setAttribute('content', getThemeColor(theme));
      })();
    </script>
    <style>
      :root {
        color-scheme: light dark;
        --theme-color-dark: %VITE_THEME_COLOR_DARK%;
        --theme-color-light: %VITE_THEME_COLOR_LIGHT%;
        --theme-foreground-dark: %VITE_THEME_COLOR_LIGHT%;
        --theme-foreground-light: %VITE_THEME_COLOR_DARK%;
      }
      body { margin: 0; }
      body {
        background: var(--theme-color-light);
        color: var(--theme-foreground-light);
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: var(--theme-color-dark);
          color: var(--theme-foreground-dark);
        }
      }
      html.dark body {
        background: var(--theme-color-dark);
        color: var(--theme-foreground-dark);
      }
      html.light body {
        background: var(--theme-color-light);
        color: var(--theme-foreground-light);
      }
    </style>
    <meta
      name="description"
      content="Instant currency converter with real-time exchange rates for crypto and fiat currencies. Fast, accurate, easy to use, works offline, and installable as a PWA." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
